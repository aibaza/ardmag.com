name: CI

on:
  push:
    branches: [master, staging]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend lint + tsc
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit

  storefront:
    name: Storefront lint + tsc
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-storefront
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend-storefront/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit
